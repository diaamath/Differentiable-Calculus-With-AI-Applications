<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differentiable Calculus with AI Applications Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .ksu-blue { color: #0073b7; }
        .ksu-bg { background-color: #0073b7; }
        .ksu-border { border-color: #0073b7; }
        .lab-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .lab-card:hover { transform: translateY(-5px); border-color: #0073b7; box-shadow: 0 10px 20px rgba(0,115,183,0.1); }
        .arabic { direction: rtl; text-align: right; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [completedLabs, setCompletedLabs] = useState([]);
            const [formData, setFormData] = useState({ studentId: '', serialNum: '' });

            useEffect(() => {
                const progress = JSON.parse(localStorage.getItem('ksu_lab_progress') || "[]");
                setCompletedLabs(progress);
                if(sessionStorage.getItem('ksu_auth') === 'true') setIsLoggedIn(true);
            }, []);

            const labs = Array.from({ length: 16 }, (_, i) => ({
                id: i + 1,
                title: `Lab Module ${i + 1}`,
                file: `lab${i + 1}.html`
            }));

            const handleLogin = (e) => {
                e.preventDefault();
                // Check if both fields are filled (you can add specific validation here)
                if(formData.studentId && formData.serialNum) {
                    setIsLoggedIn(true);
                    sessionStorage.setItem('ksu_auth', 'true');
                }
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full border-t-8 ksu-border text-center">
                            <img src="CFY_Logo.png" className="h-16 mx-auto mb-6" />
                            <h2 className="text-xl font-black ksu-blue uppercase mb-2 leading-tight">Differentiable Calculus</h2>
                            <p className="text-slate-400 font-bold text-[10px] uppercase tracking-widest mb-6 border-b pb-4">AI Applications Portal</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="text-left">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">University ID</label>
                                    <input 
                                        type="text" 
                                        placeholder="Enter Student ID" 
                                        className="w-full p-4 bg-slate-50 rounded-xl border-2 outline-none focus:border-blue-500 font-bold"
                                        value={formData.studentId}
                                        onChange={(e) => setFormData({...formData, studentId: e.target.value})}
                                        required 
                                    />
                                </div>
                                <div className="text-left">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Book Serial Number</label>
                                    <input 
                                        type="password" 
                                        placeholder="Enter Serial Number" 
                                        className="w-full p-4 bg-slate-50 rounded-xl border-2 outline-none focus:border-blue-500 font-bold"
                                        value={formData.serialNum}
                                        onChange={(e) => setFormData({...formData, serialNum: e.target.value})}
                                        required 
                                    />
                                </div>
                                <button className="w-full ksu-bg text-white py-4 rounded-xl font-black uppercase tracking-widest hover:brightness-110 shadow-lg transition-all mt-4">
                                    Verify & Access Labs
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-white border-b-4 ksu-border p-6 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <img src="CFY_Logo.png" className="h-10" />
                        <div className="text-right">
                            <p className="text-xs font-black ksu-blue uppercase leading-none mb-1">Total Progress: {Math.round((completedLabs.length/16)*100)}%</p>
                            <button onClick={() => {sessionStorage.clear(); location.reload();}} className="text-[9px] font-bold text-red-500 uppercase tracking-widest hover:underline">Logout Terminal</button>
                        </div>
                    </header>

                    <main className="p-6 max-w-7xl mx-auto">
                        <div className="mb-8 flex justify-between items-end">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800 italic uppercase">Your Dashboard</h2>
                                <p className="text-slate-400 font-bold text-xs tracking-widest">INTERACTIVE LAB CURRICULUM</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            {labs.map(lab => (
                                <div key={lab.id} className="lab-card bg-white p-6 rounded-2xl relative">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className={`text-[9px] font-black px-2 py-1 rounded tracking-tighter ${completedLabs.includes(lab.id) ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}>
                                            {completedLabs.includes(lab.id) ? '✓ COMPLETED' : 'STATUS: PENDING'}
                                        </span>
                                        <span className="text-2xl font-black italic text-slate-100">0{lab.id}</span>
                                    </div>
                                    <h3 className="font-black text-slate-800 mb-6">{lab.title}</h3>
                                    <a href={lab.file} className="block w-full text-center py-3 ksu-bg text-white rounded-lg font-black text-[10px] uppercase tracking-widest hover:brightness-110 transition-all">Launch Lab</a>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
