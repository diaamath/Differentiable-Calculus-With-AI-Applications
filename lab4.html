<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math 101 — Transformers in AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .ksu-blue { color: #0073b7; }
        .ksu-bg { background-color: #0073b7; }
        .ksu-border { border-color: #0073b7; }
        .math-font { font-family: 'Courier New', monospace; }
        .arabic { direction: rtl; text-align: right; }
        
        .btn-primary {
            background: linear-gradient(135deg, #0073b7 0%, #005a8e 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 115, 183, 0.3);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 115, 183, 0.4);
            filter: brightness(110%);
        }
        .btn-primary:active { transform: scale(0.96); }

        .btn-reset {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .btn-reset:hover { filter: brightness(110%); transform: translateY(-1px); }

        .result-black {
            background-color: #0f172a;
            border-left: 4px solid #0073b7;
            color: #38bdf8;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .activity-box {
            background: linear-gradient(135deg, #eef2ff, #e0f2fe);
            border: 1px solid #c7d2fe;
            border-left: 6px solid #1e40af;
        }

        .step-circle {
            background: linear-gradient(135deg, #1e40af, #2563eb);
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const ConceptBox = ({ en, ar }) => (
            <div className="bg-blue-50 border-l-4 ksu-border p-4 rounded-r-lg mb-4 shadow-sm">
                <p className="font-semibold text-slate-800 text-sm italic">Concept: <span className="font-normal not-italic">{en}</span></p>
                <p className="font-semibold text-slate-800 mt-2 text-sm arabic">الفكرة: <span className="font-normal">{ar}</span></p>
            </div>
        );

        const OutputDisplay = ({ content }) => (
            <div className="mt-3 result-black math-font text-sm min-h-[50px] whitespace-pre-wrap overflow-x-auto">
                {content || "> System Ready. Awaiting Position Parameters..."}
            </div>
        );

        const App = () => {
            const [pos, setPos] = useState(2);
            const [dim, setDim] = useState(1);
            const [output, setOutput] = useState("");

            const computePE = () => {
                const p = parseFloat(pos);
                const i = parseFloat(dim);
                const d_model = 512;

                const angle = p / Math.pow(10000, (2 * i) / d_model);
                const sinVal = Math.sin(angle);
                const cosVal = Math.cos(angle);

                const result = `Transformer Positional Encoding:
---------------------------------
θ = pos / 10000^(2i / 512)

[INPUTS]
Position: ${p} | Index: ${i}

[RESULTS]
SIN (Even Index): ${sinVal.toFixed(6)}
COS (Odd Index) : ${cosVal.toFixed(6)}

Conclusion:
• Coordinates generated successfully.
• Order is mathematically preserved.`;

                setOutput(result);
            };

            const resetExperiment = () => {
                setPos(0);
                setDim(0);
                setOutput("");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b-4 ksu-border px-6 py-4 flex flex-col md:flex-row justify-between items-center shadow-md sticky top-0 z-50">
                        <img src="CFY_Logo.png" alt="KSU Logo" className="h-14 mb-4 md:mb-0 object-contain" />
                        <div className="text-center md:text-right">
                            <h1 className="text-xl md:text-2xl font-black ksu-blue uppercase tracking-tight">Section 1.4</h1>
                            <p className="text-slate-500 font-bold text-xs uppercase tracking-widest leading-tight">Transformers: History, Role, and Applications</p>
                        </div>
                    </header>

                    <main className="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-8">
                            <section className="bg-white p-2 rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <img src="1.4_image.png" alt="Transformer Concept" className="w-full h-67 object-cover rounded-xl mb-4" />
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-6 text-sm text-slate-700 font-semibold italic">
                                    <p>Transformers use trigonometry to inject order into word sequences.</p>
                                    <p className="arabic">تستخدم المحولات حساب المثلثات لإدخال الترتيب في تسلسلات الكلمات.</p>
                                </div>
                            </section>

                            <section className="activity-box p-6 rounded-2xl shadow-xl">
                                <h3 className="text-xl font-black text-blue-900 mb-6 uppercase tracking-wider">Student Activity</h3>
                                <div className="space-y-6">
                                    <div className="flex items-start gap-4">
                                        <div className="step-circle w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-black">1</div>
                                        <div className="text-sm">
                                            <p className="font-bold text-slate-800">Set Position Parameters</p>
                                            <p className="arabic text-slate-600">حدد موضع الكلمة (pos) وفهرس البعد (i).</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="step-circle w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-black">2</div>
                                        <div className="text-sm">
                                            <p className="font-bold text-slate-800">Compute Coordinates</p>
                                            <p className="arabic text-slate-600">احسب التشفير الموضعي باستخدام الدوال المثلثية.</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4">
                                        <div className="step-circle w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center font-black">3</div>
                                        <div className="text-sm">
                                            <p className="font-bold text-slate-800">Reset & Experiment</p>
                                            <p className="arabic text-slate-600">أعد تعيين القيم وجرب بصمات مكانية مختلفة.</p>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        </div>

                        <div className="space-y-8">
                            <section className="bg-white p-6 rounded-2xl shadow-xl border-t-8 ksu-border">
                                <div className="flex items-center mb-6">
                                    <div className="ksu-bg text-white px-3 py-1 rounded text-xs font-black mr-3 uppercase shadow-sm italic leading-none">Engine</div>
                                    <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight">Order Computation</h2>
                                </div>
                                
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Token Pos</label>
                                            <input type="number" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:ksu-border outline-none transition-all" value={pos} onChange={(e)=>setPos(e.target.value)} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Dim Index (i)</label>
                                            <input type="number" className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:ksu-border outline-none transition-all" value={dim} onChange={(e)=>setDim(e.target.value)} />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <button onClick={computePE} className="btn-primary font-black py-4 rounded-xl text-xs uppercase tracking-widest">⚙️ Compute Encoding</button>
                                        <button onClick={resetExperiment} className="btn-reset font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-lg">🔄 Reset & Experiment</button>
                                    </div>

                                    <div>
                                        <h3 className="text-[10px] font-black uppercase text-blue-500 mb-2 tracking-widest">Mathematical Output</h3>
                                        <OutputDisplay content={output} />
                                    </div>

                                    <div className="pt-4 border-t border-slate-100 text-center">
                                        <p className="text-[11px] font-bold text-orange-600 uppercase tracking-tight">● Observe how trigonometry creates a unique spatial fingerprint for sequences.</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </main>

                    <footer className="bg-white border-t-4 ksu-border mt-12 py-12 text-center shadow-lg">
                        <p className="font-black ksu-blue text-2xl tracking-tight mb-2 uppercase">Differentiable Calculus with AI Applications</p>
                        <p className="text-slate-400 font-bold text-[11px] uppercase tracking-[0.4em]">Deanship of Common First Year – Basic Sciences Department</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
