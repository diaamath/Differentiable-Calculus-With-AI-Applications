<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Differentiable Calculus with AI Applications — Functions in AI</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .ksu-blue { color: #0073b7; }
        .ksu-bg { background-color: #0073b7; }
        .ksu-border { border-color: #0073b7; }
        .math-font { font-family: 'Courier New', monospace; }
        .arabic { direction: rtl; text-align: right; }
        
        .btn-primary {
            background: linear-gradient(135deg, #0073b7 0%, #005a8e 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 115, 183, 0.3);
            border: none;
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 115, 183, 0.4);
            filter: brightness(110%);
        }
        .btn-primary:active { transform: scale(0.96); }

        .btn-reset {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .btn-reset:hover { filter: brightness(110%); transform: translateY(-1px); }

        .result-black {
            background-color: #0f172a;
            border-left: 4px solid #0073b7;
            color: #38bdf8;
        }

        .note-orange {
            color: #ea580c;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ConceptBox = ({ en, ar }) => (
            <div className="bg-blue-50 border-l-4 ksu-border p-4 rounded-r-lg mb-4 shadow-sm">
                <p className="font-semibold text-slate-800 text-sm italic">Concept: <span className="font-normal not-italic">{en}</span></p>
                <p className="font-semibold text-slate-800 mt-2 text-sm arabic">الفكرة: <span className="font-normal">{ar}</span></p>
            </div>
        );

        const OutputDisplay = ({ content }) => (
            <div className="mt-3 p-4 result-black rounded-lg math-font text-sm min-h-[50px] whitespace-pre-wrap shadow-2xl overflow-x-auto">
                {content || "> System initialized. Awaiting input..."}
            </div>
        );

        const App = () => {
            const [nnInput, setNnInput] = useState(2);
            const [output, setOutput] = useState("");
            const currentLabId = 12;

            useEffect(() => {
                const progress = JSON.parse(localStorage.getItem('ksu_lab_progress') || "[]");
                if(!progress.includes(currentLabId)) {
                    progress.push(currentLabId);
                    localStorage.setItem('ksu_lab_progress', JSON.stringify(progress));
                }
            }, []);

            const runNeuralNetwork = () => {
                const x = parseFloat(nnInput);
                const w = 1.5;
                const b = -1;
                const sigmoid = (z) => 1 / (1 + Math.exp(-z));
                const z = w * x + b;
                const y = sigmoid(z);

                const resultText = `[NEURAL COMPUTATION LOG]
---------------------------
FUNCTION: f(x) = σ(wx + b)

INPUT DATA: x = ${x}
PARAMETERS: w = ${w}, b = ${b}

PROCESS:
z = (${w} * ${x}) + (${b}) = ${z.toFixed(3)}

FINAL OUTPUT:
f(x) = ${y.toFixed(4)}

RESULT: Deterministic mapping successful.`;
                setOutput(resultText);
            };

            const resetExperiment = () => {
                setNnInput(0);
                setOutput("");
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b-4 ksu-border px-6 py-4 flex flex-col md:flex-row justify-between items-center shadow-md sticky top-0 z-50">
                        <img src="CFY_Logo.png" alt="KSU Logo" className="h-14 mb-4 md:mb-0 object-contain" />
                        <div className="text-center md:text-right">
                            <h1 className="text-xl md:text-2xl font-black ksu-blue uppercase tracking-tight leading-tight">Section 1.2</h1>
                            <p className="text-slate-500 font-bold text-xs uppercase tracking-widest">Functions in Artificial Intelligence</p>
                        </div>
                    </header>

                    <main className="flex-grow p-4 md:p-8 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="space-y-8">
                            <section className="bg-white p-2 rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
                                <img src="1.2_image.png" alt="AI Concept" className="w-full h-72 object-cover rounded-xl mb-4" />
                                <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="md:border-r md:pr-4 font-medium italic text-sm text-slate-700">
                                        In AI, models are mathematical functions that map inputs to outputs.
                                    </div>
                                    <div className="arabic font-medium text-sm text-slate-700">
                                        في الذكاء الاصطناعي، النماذج هي دوال رياضية تحول المدخلات إلى مخرجات.
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-2xl shadow-xl border-t-8 ksu-border">
                                <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight mb-4 flex items-center">
                                    <span className="ksu-bg text-white px-2 py-0.5 rounded text-xs mr-2 uppercase italic shadow-sm">Theory</span>
                                    Learning Objectives
                                </h2>
                                <div className="space-y-4 text-sm text-slate-600 leading-relaxed">
                                    <p className="italic border-l-2 border-slate-200 pl-4">
                                        This lab demonstrates that a neural network is a mathematical function. Each input produces exactly one unique output.
                                    </p>
                                    <p className="arabic border-r-2 border-slate-200 pr-4 font-medium">
                                        يوضح هذا المعمل أن الشبكة العصبية هي دالة رياضية. عند تثبيت النموذج، ينتج عن كل مُدخل مخرج واحد فقط.
                                    </p>
                                </div>
                            </section>
                        </div>

                        <div className="space-y-8">
                            <section className="bg-white p-6 rounded-2xl shadow-xl border-t-8 ksu-border transition-transform hover:scale-[1.01]">
                                <div className="flex items-center mb-6">
                                    <div className="ksu-bg text-white px-3 py-1 rounded text-xs font-black mr-3 uppercase shadow-sm">Ex 01</div>
                                    <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight">Neural Computation</h2>
                                </div>
                                <ConceptBox 
                                    en="A neural network is a function f(x)." 
                                    ar="الشبكة العصبية هي دالة رياضية f(x)." 
                                />
                                <div className="space-y-4">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Input Value (x)</label>
                                    <input 
                                        type="number" 
                                        step="0.1" 
                                        className="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl focus:ksu-border outline-none transition-all shadow-inner" 
                                        value={nnInput} 
                                        onChange={(e)=>setNnInput(e.target.value)} 
                                    />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <button onClick={runNeuralNetwork} className="w-full btn-primary font-black py-4 rounded-xl uppercase tracking-wider text-sm shadow-md">
                                            ⚙️ Apply Function
                                        </button>
                                        <button onClick={resetExperiment} className="w-full btn-reset font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-lg">
                                            🔄 Reset Experiment
                                        </button>
                                    </div>
                                    <OutputDisplay content={output} />
                                    <div className="note-orange">● Observation: The black box above represents the deterministic output of the AI function.</div>
                                </div>
                            </section>

                            <section className="bg-white p-6 rounded-2xl shadow-xl border-t-8 ksu-border">
                                <h2 className="text-lg font-black text-slate-800 uppercase tracking-tight mb-4 text-center">Student Activity</h2>
                                <div className="space-y-4 text-sm text-slate-600">
                                    <p className="italic leading-relaxed">
                                        Change the input value x and observe the output f(x). Notice how the activation function squashes the result between 0 and 1.
                                    </p>
                                    <p className="arabic font-medium leading-relaxed">
                                        غيّر قيمة المُدخل x ولاحظ المخرج f(x) للشبكة العصبية. افهم أن نفس المُدخل يعطي دائمًا نفس المخرج.
                                    </p>
                                </div>
                            </section>
                        </div>
                    </main>

                    <footer className="bg-white border-t-4 ksu-border mt-12 py-12 text-center shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                        <p className="font-black ksu-blue text-2xl tracking-tight mb-2 uppercase">Differentiable Calculus with AI Applications</p>
                        <p className="text-slate-400 font-bold text-[11px] uppercase tracking-[0.4em]">Deanship of Common First Year – Basic Sciences Department</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
